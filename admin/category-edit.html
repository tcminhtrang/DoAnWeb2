  <a href="../admin/category.html" class="active">    
    <img src="/assets/images/icons/burger.png" alt="Loại sản phẩm">
   <span>Loại sản phẩm</span>

 <a href="../admin/price.html">

  <main class="main-content">
  <header class="main-header">
   <h1>Sửa loại sản phẩm</h1>
  </header>

  <section class="form-section">
      <form action="#" method="GET" class="data-form">
    
    <div class="form-group">
     <label for="category-id">Mã loại:</label>
          <input type="text" id="category-id" name="category-id" value="L01" readonly style="background-color: #eee;">
    </div>

    <div class="form-group">
     <label for="category-name">Tên loại:</label>
     <input type="text" id="category-name" name="category-name" value="Gà rán" required>
    </div>

    <div class="form-group">
     <label for="category-desc">Mô tả:</label>
          <textarea id="category-desc" name="category-desc" rows="4">Các món gà chiên giòn, hương vị đậm đà</textarea>
   </div>
    <div class="form-group">
     <label for="category-status">Trạng thái:</label>
     <select id="category-status" name="category-status">
            <option value="active" selected>Đang hiển thị</option>
      <option value="hidden">Ẩn</option>
     </select>
    </div>

    <div class="form-actions">
          <a href="category.html" class="btn-primary">Lưu thay đổi</a>
          <a href="category.html" class="btn-cancel">Hủy</a>
    </div>
   </form>
  </section>
 </main>
</body>
</html>
