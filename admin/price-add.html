   </a>
   <a href="../admin/user-management.html" > 
    <img src="/assets/images/icons/user-add.png" alt="Quản lý người dùng">

   </a>
   <a href="../admin/category.html">
    <img src="/assets/images/icons/burger.png" alt="Loại sản phẩm">
    <span>Loại sản phẩm</span>

   <a href="../admin/list.html">

   <a href="../admin/import.html">
    <img src="/assets/images/icons/import.png" alt="Nhập hàng">

         <a href="../admin/price.html" class="active"> 
    <img src="/assets/images/icons/dollar.png" alt="Giá bán">

   <a href="../admin/order-management.html">

 </div>

 </aside>

   <main class="main-content">
  <header class="main-header">
         <h1>Cập nhật giá bán mới</h1>
   <a href="price.html" class="btn-primary" style="background: #6c757d;">Quay lại</a>
  </header>

    <form action="price.html" method="get">
    <section class="form-section">
        
        <div class="form-group">
     <label for="prod-category">Chọn loại sản phẩm:</label>
     <select id="prod-category">
            <option value="L01">Gà rán</option>
            <option value="L02">Burger</option>
            <option value="L03">Combo ăn trưa</option>
            <option value="L04">Mỳ Ý</option>
            <option value="L05">Pizza</option>
            <option value="L06">Món ăn kèm</option>
            <option value="L07">Đồ uống</option>
            <option value="L08">Tráng miệng</option>
     </select>
    </div>

    <div class="form-group">
  <label for="prod-cost">Giá nhập (vốn):</label>
  <input type="number" id="prod-cost" placeholder="Ví dụ: 15000">
</div>

<div class="form-group">
  <label for="prod-profit">% Lợi nhuận:</label>
  <input type="number" id="prod-profit" placeholder="Ví dụ: 150 (cho 150%)">
</div>

<div class="form-group">
  <label for="prod-price">Giá bán (VAT):</label>
  <input type="number" id="prod-price" placeholder="Ví dụ: 39000">
</div>
            <div class="form-actions">
     <a href="price.html" class="btn-primary">Áp dụng thay đổi</a>
     <a href="price.html" class="btn-cancel">Hủy bỏ</a>
    </div>
   </section>
    </form>
 </main>
</body>
</html>
