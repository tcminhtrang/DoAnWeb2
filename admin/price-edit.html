<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/assets/images/logo-1.png" />
  <title>ChickenJoy Admin | Sửa giá sản phẩm</title>
  <link rel="stylesheet" href="/assets/css/admin.css" />
</head>
<body class="admin-body">
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="/assets/images/logo.png" alt="Logo" class="logo-img">
      <h2><span> ChickenJoy</span></h2>
    </div>
    <nav class="sidebar-menu">
      <a href="../admin/dashboard.html"> 
        <img src="/assets/images/icons/home.png" alt="Trang chủ">
        <span>Trang chủ</span>
      </a>
      <a href="../admin/user-management.html" > 
    <img src="/assets/images/icons/user-add.png" alt="Quản lý người dùng">
    <span>Quản lý người dùng</span>
   </a>
   <a href="../admin/category.html">
    <img src="/assets/images/icons/burger.png" alt="Loại sản phẩm">
    <span>Loại sản phẩm</span>
   </a>
   <a href="../admin/list.html">
    <img src="/assets/images/icons/app.png" alt="Danh mục sản phẩm">
    <span>Danh mục sản phẩm</span>
   </a>
   <a href="../admin/import.html">
    <img src="/assets/images/icons/import.png" alt="Nhập hàng">
    <span>Nhập hàng</span>
   </a>

   <a href="../admin/price.html" class="active"> 
    <img src="/assets/images/icons/dollar.png" alt="Giá bán">
    <span>Giá bán</span>
   </a>
      
         <a href="../admin/order-management.html" > 
    <img src="/assets/images/icons/order-history.png" alt="Quản lý đơn đặt hàng">
    <span>Quản lý đơn đặt hàng</span>
   </a>
         <a href="../admin/inventory.html"> 
    <img src="/assets/images/icons/inventory-alt.png" alt="Quản lý tồn kho">
    <span>Quản lý tồn kho</span>
   </a>
   <div class="sidebar-footer">
  <a href="../index.html" class="logout-btn">
    <span>Đăng xuất</span>
  </a>
 </div>
  </nav>
  </aside>

  <main class="main-content">
    <header class="main-header">
      <h1>Cập nhật giá chi tiết</h1>
      <a href="price.html" class="btn-primary" style="background: #6c757d;">Quay lại</a>
    </header>

    <section class="form-section">
      <form action="#" method="get">
        <div class="form-group">
          <label for="prod-code">Mã sản phẩm:</label>
          <input type="text" id="prod-code" value="SP001" readonly style="background: #eee;">
        </div>

        <div class="form-group">
          <label for="prod-name">Tên sản phẩm:</label>
          <input type="text" id="prod-name" value="Gà rán giòn tan" readonly style="background: #eee;">
        </div>
        
        <div class="form-group">
          <label for="prod-cost">Giá nhập (Vốn):</label>
          <input type="text" id="prod-cost" value="35.000đ" readonly style="background: #eee;">
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">

        <div class="form-group">
          <label for="prod-profit">Phần trăm lợi nhuận (%):</label>
          <input type="number" id="prod-profit" value="154">
        </div>
        
        <div class="form-group">
          <label for="prod-price">Giá bán (VNĐ):</label>
          <input type="number" id="prod-price" value="89000">
        </div>
        
        <div style="font-style: italic; color: #555;">
          <p>Lưu ý: Bạn có thể nhập % lợi nhuận (giá bán sẽ tự tính) hoặc nhập giá bán thủ công (lợi nhuận sẽ tự tính).</p>
        </div>

        <div class="form-actions">
          <a href="price.html" class="btn-primary">Lưu thay đổi</a>
          <a href="price.html" class="btn-cancel">Hủy bỏ</a>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
